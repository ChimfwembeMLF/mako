# Dokploy: set variables in Compose app → Environment. Dokploy writes them to `.env` next to
# this file. You MUST use `env_file: .env` below — UI vars are NOT auto-injected into containers.
# Local: docker compose --env-file api-rust/.env up --build  (copies/symlinks .env as needed)

services:
  api:
    build:
      context: ./api-rust
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-4000}
      - QUEUES_ENABLED=${QUEUES_ENABLED:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    ports:
      - "5173:5173"
    restart: unless-stopped

networks:
  default:
    name: dokploy-network
    external: true
