# Dokploy Environment tab (g → e): paste output of `./scripts/export-dokploy-env.sh`
# See docs/DOKPLOY_ENV.md — no # comments, no multi-line JWT PEM. env_file loads .env into api.

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-4000}
      - QUEUES_ENABLED=${QUEUES_ENABLED:-true}
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: dokploy-network
    external: true
