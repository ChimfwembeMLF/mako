# Dokploy: set variables in Compose app → Environment. Dokploy writes them to `.env` next to
# this file. You MUST use `env_file: .env` below — UI vars are NOT auto-injected into containers.
# Local: cp api/.env.production .env && docker compose up --build
#
# Docker .env rules: one KEY=value per line, quote values that contain spaces,
# no multi-line PEM blocks (JWT_PRIVATE_KEY). Mako auth uses JWT_SECRET only.

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-4000}
      - QUEUES_ENABLED=${QUEUES_ENABLED:-true}
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: dokploy-network
    external: true
