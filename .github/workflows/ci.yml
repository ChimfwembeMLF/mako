name: CI

on:
  push:
    branches: [main]
    paths:
      - "autopilot-api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "autopilot-api/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: autopilot-api

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (API + client)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: autopilot-api/yarn.lock

      - name: Install API dependencies
        run: yarn install --immutable

      - name: Install client dependencies
        run: npm ci --ignore-scripts
        working-directory: autopilot-api/resources/client

      - name: Build client and API
        run: yarn build

  test-client:
    name: Test (client)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: autopilot-api/resources/client/package-lock.json

      - name: Install client dependencies
        run: npm ci --ignore-scripts
        working-directory: autopilot-api/resources/client

      - name: Run client tests
        run: npm test
        working-directory: autopilot-api/resources/client

  test-api:
    name: Test (API)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: autopilot-api/yarn.lock

      - name: Install API dependencies
        run: yarn install --immutable

      - name: Run API unit tests
        run: yarn test --passWithNoTests

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: autopilot-api/yarn.lock

      - name: Install API dependencies
        run: yarn install --immutable

      - name: Install client dependencies
        run: npm ci --ignore-scripts
        working-directory: autopilot-api/resources/client

      - name: Lint API
        run: yarn lint:ci

      - name: Lint client
        run: npm run lint
        working-directory: autopilot-api/resources/client
