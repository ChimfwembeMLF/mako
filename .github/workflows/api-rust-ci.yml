name: API Rust CI

on:
  push:
    branches: [main]
    paths:
      - "api-rust/**"
      - ".github/workflows/api-rust-ci.yml"
  pull_request:
    paths:
      - "api-rust/**"
      - ".github/workflows/api-rust-ci.yml"

concurrency:
  group: api-rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: api-rust

jobs:
  build:
    name: Build & test (api-rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api-rust

      - name: Format check
        run: cargo fmt --check

      - name: Unit tests
        run: cargo test

      - name: Release build
        run: cargo build --release

      - name: Validate OpenAPI routes registry
        run: jq empty src/openapi/routes.json

      - name: Validate smoke parity script
        run: bash -n scripts/smoke-parity.sh

  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api-rust

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
