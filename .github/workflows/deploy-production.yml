name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - "autopilot-api/**"
      - ".github/workflows/deploy-production.yml"
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run database migrations during deploy"
        type: boolean
        default: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RUN_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations == false && 'false' || 'true' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: DEPLOY_PATH,RUN_MIGRATIONS
          script_stop: true
          script: |
            set -euo pipefail

            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "DEPLOY_PATH secret is not set."
              exit 1
            fi

            cd "$DEPLOY_PATH"
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main

            if [ "$(basename "$PWD")" != "autopilot-api" ]; then
              cd autopilot-api
            fi

            if [ "$RUN_MIGRATIONS" = "true" ]; then
              corepack yarn deploy:prod
            else
              bash scripts/deploy-production.sh
            fi
