# Nginx reference config (local/docker). Production uses LiteSpeed — see deploy/litespeed/.
#
# Phase 1: health → Rust; everything else → Nest
# Phase 2: uncomment location /api/ block; remove or narrow health-only location

upstream mako_api_rust {
    server 127.0.0.1:4006;
    keepalive 32;
}

upstream mako_api_nest {
    server 127.0.0.1:4005;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name mako.tekreminnovations.com;

    # Phase 1 — health probe on Rust
    location = /api/v1/health {
        proxy_pass http://mako_api_rust;
        include proxy_params.conf;
    }

    # Phase 2 — full API cutover (comment out Phase 1 location above)
    # location /api/ {
    #     proxy_pass http://mako_api_rust;
    #     include proxy_params.conf;
    # }

    location /api/ {
        proxy_pass http://mako_api_nest;
        include proxy_params.conf;
    }

    location /uploads/ {
        proxy_pass http://mako_api_nest;
        include proxy_params.conf;
    }

    location /documentation {
        proxy_pass http://mako_api_nest;
        include proxy_params.conf;
    }

    location / {
        proxy_pass http://mako_api_nest;
        include proxy_params.conf;
    }
}
